<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Successful - Nodes Active</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #051911, #0b3c26, #0b132b);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;
        }
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 255, 128, 0.15) 1px, transparent 0); background-size: 24px 24px;
        }
        .celebration-arena { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .victory-item { position: absolute; font-size: 3rem; bottom: -80px; animation: flyUpwards 5s infinite ease-in-out; opacity: 0.8; }
        .success-container {
            background: rgba(5, 25, 17, 0.85); backdrop-filter: blur(20px); border: 2px solid rgba(0, 255, 128, 0.4);
            padding: 45px; border-radius: 25px; width: 460px; box-shadow: 0 20px 50px rgba(0, 255, 128, 0.25); z-index: 10; text-align: center;
            animation: victoryBounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-icon { font-size: 5.5rem; animation: dance 1.2s infinite ease-in-out; display: inline-block; margin-bottom: 10px; }
        h2 { color: #ffffff; font-size: 2.2rem; letter-spacing: 2px; text-shadow: 0 0 20px rgba(0, 255, 128, 0.6); margin-bottom: 5px; }
        .success-subtitle { color: #00ff80; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; }
        .success-box { color: #e0e0e0; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; background: rgba(255, 255, 255, 0.04); padding: 20px; border-radius: 15px; border: 1px solid rgba(0, 255, 128, 0.2); }
        .squad-shoutout { color: #00ffcc; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }
        .btn-dashboard { display: block; width: 100%; padding: 15px; color: #051911; font-size: 1.1rem; font-weight: bold; text-decoration: none; border-radius: 30px; background: linear-gradient(45deg, #00ff80, #00ffcc); transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(0, 255, 128, 0.3); text-align: center; }
        .btn-dashboard:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0, 255, 204, 0.6); }
        @keyframes victoryBounce { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes dance { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes flyUpwards { 0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateY(-115vh) translateX(60px) scale(1.3); opacity: 0; } }
    </style>
</head>
<body>
    <div class="celebration-arena">
        <div class="victory-item" style="left: 7%; animation-duration: 4s;">✌️</div>
        <div class="victory-item" style="left: 24%; animation-duration: 6s; animation-delay: 1s;">🏆</div>
        <div class="victory-item" style="left: 45%; animation-duration: 5s; animation-delay: 2s;">🎉</div>
        <div class="victory-item" style="left: 70%; animation-duration: 7s;">✨</div>
        <div class="victory-item" style="left: 88%; animation-duration: 4.5s; animation-delay: 0.5s;">👑</div>
    </div>
    <div class="success-container">
        <div class="success-icon">🏆✌️</div>
        <h2>ACCESS GRANTED</h2>
        <div class="success-subtitle">Pipeline Node Verified</div>
        <div class="success-box">
            Container cluster successfully deployed on node network terminal! Authentication validation passed.
            <div class="squad-shoutout">Project Maintained by Syed Ali Haider & Squad</div>
        </div>
        <a href="/login" class="btn-dashboard">Back to Terminal Login Node 🚀</a>
    </div>
</body>
</html>
